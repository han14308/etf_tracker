<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ETF Track</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #dde2e8;
      --text: #171a1f;
      --muted: #667085;
      --blue: #1f6feb;
      --green: #12805c;
      --orange: #d76b00;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Noto Sans KR", sans-serif; color: var(--text); background: var(--bg); }
    header { padding: 22px 28px; background: var(--panel); border-bottom: 1px solid var(--line); }
    main { max-width: 1480px; margin: 0 auto; padding: 22px 28px 48px; }
    h1 { margin: 0 0 6px; font-size: 26px; }
    .muted { color: var(--muted); }
    .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    label { font-size: 13px; color: #344054; }
    input, select, button { height: 36px; border: 1px solid #cfd4dc; background: #fff; padding: 0 10px; font-size: 14px; }
    button { background: var(--blue); color: #fff; border-color: var(--blue); cursor: pointer; }
    .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 14px; }
    .tab {
      flex: 0 0 auto;
      min-width: 150px;
      max-width: 260px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 10px 12px;
      text-align: left;
      color: var(--text);
    }
    .tab.active { border-color: var(--blue); box-shadow: inset 0 0 0 1px var(--blue); }
    .tab-name { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .tab-meta { display: block; margin-top: 5px; color: var(--muted); font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 4px 0 20px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 15px; }
    .metric { margin-top: 8px; font-size: 24px; font-weight: 700; }
    .split { display: grid; grid-template-columns: 1fr 320px; gap: 16px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .panel-title { font-weight: 700; }
    .search { width: 240px; }
    .table-wrap { overflow: auto; max-height: 680px; }
    table { width: 100%; min-width: 860px; border-collapse: collapse; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #edf0f2; text-align: right; font-size: 13px; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f2f4f7; color: #344054; z-index: 1; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
    tbody tr:hover { background: #f8fbff; }
    .rank-list { padding: 8px 0; }
    .rank-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #edf0f2; }
    .rank-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-value { font-weight: 700; color: var(--green); }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    @media (max-width: 980px) {
      main, header { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr 1fr; }
      .split { grid-template-columns: 1fr; }
      .search { width: 100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ETF Track</h1>
    <div class="muted">날짜별 ETF 구성종목 조회</div>
  </header>

  <main>
    <div class="toolbar">
      <label>기준일 <input id="dateInput" type="date" list="dateOptions" /></label>
      <datalist id="dateOptions"></datalist>
      <label>빠른 선택 <select id="dateSelect"></select></label>
      <button id="refresh">조회</button>
      <span id="status" class="muted"></span>
    </div>

    <div id="tabs" class="tabs"></div>

    <div class="grid">
      <div class="card">
        <div class="muted">선택 ETF</div>
        <div id="selectedName" class="metric">-</div>
      </div>
      <div class="card">
        <div class="muted">종목수</div>
        <div id="holdingCount" class="metric">-</div>
      </div>
      <div class="card">
        <div class="muted">총 평가금액</div>
        <div id="totalValue" class="metric">-</div>
      </div>
      <div class="card">
        <div class="muted">총 비중</div>
        <div id="totalWeight" class="metric">-</div>
      </div>
    </div>

    <div class="split">
      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">구성종목</div>
            <div id="tableSub" class="muted"></div>
          </div>
          <input id="search" class="search" placeholder="종목명 또는 코드 검색" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>종목코드</th>
                <th>종목명</th>
                <th>수량</th>
                <th>평가금액</th>
                <th>비중</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <div class="panel-title">상위 비중</div>
        </div>
        <div id="rankList" class="rank-list"></div>
      </aside>
    </div>
  </main>

  <script>
    const state = {
      dates: [],
      products: new Map(),
      summaries: [],
      selectedEtf: '',
      holdings: [],
    };

    async function init() {
      await Promise.all([loadDates(), loadProducts()]);
      await loadEtfTabs();
    }

    async function loadDates() {
      state.dates = await fetch('/api/dates').then(r => r.json());
      const dateSelect = document.getElementById('dateSelect');
      const dateInput = document.getElementById('dateInput');
      const options = document.getElementById('dateOptions');
      dateSelect.innerHTML = state.dates.map(d => `<option value="${d}">${d}</option>`).join('');
      options.innerHTML = state.dates.map(d => `<option value="${d}"></option>`).join('');
      if (state.dates.length) dateInput.value = state.dates[0];
    }

    async function loadProducts() {
      const products = await fetch('/api/products').then(r => r.json()).catch(() => []);
      state.products = new Map(products.map(product => [product.etf_code, product]));
    }

    async function loadEtfTabs() {
      const date = currentDate();
      if (!date) return;
      setStatus('ETF 목록 조회 중...');
      const summaries = await fetch(`/api/summary?start=${date}&end=${date}`).then(r => r.json());
      state.summaries = summaries;
      if (!state.selectedEtf || !summaries.some(row => row.etf_code === state.selectedEtf)) {
        state.selectedEtf = preferredEtf(summaries);
      }
      renderTabs();
      await loadHoldings();
    }

    function preferredEtf(summaries) {
      const codes = summaries.map(row => row.etf_code);
      return codes.find(code => code === 'KODEX_200') || codes.find(code => code.startsWith('TIME_')) || codes[0] || '';
    }

    function renderTabs() {
      const tabs = document.getElementById('tabs');
      if (!state.summaries.length) {
        tabs.innerHTML = '<div class="empty">선택한 날짜에 저장된 ETF가 없습니다.</div>';
        return;
      }
      tabs.innerHTML = state.summaries.map(summary => {
        const product = state.products.get(summary.etf_code);
        const name = product?.name || prettyCode(summary.etf_code);
        const active = summary.etf_code === state.selectedEtf ? ' active' : '';
        return `
          <button class="tab${active}" data-etf="${summary.etf_code}">
            <span class="tab-name">${escapeHtml(shortName(name))}</span>
            <span class="tab-meta">${escapeHtml(summary.etf_code)} · ${fmtNum(summary.holding_count)}개</span>
          </button>`;
      }).join('');
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', async () => {
          state.selectedEtf = tab.dataset.etf;
          renderTabs();
          await loadHoldings();
        });
      });
    }

    async function loadHoldings() {
      const date = currentDate();
      if (!date || !state.selectedEtf) return;
      setStatus(`${displayEtfName(state.selectedEtf)} 조회 중...`);
      state.holdings = await fetch(`/api/holdings?trade_date=${date}&etf_code=${encodeURIComponent(state.selectedEtf)}`).then(r => r.json());
      renderSummary();
      renderRows();
      setStatus(`${displayEtfName(state.selectedEtf)} ${fmtNum(state.holdings.length)}개 종목`);
    }

    function renderSummary() {
      const summary = state.summaries.find(row => row.etf_code === state.selectedEtf) || {};
      document.getElementById('selectedName').textContent = shortName(displayEtfName(state.selectedEtf));
      document.getElementById('holdingCount').textContent = fmtNum(summary.holding_count || state.holdings.length);
      document.getElementById('totalValue').textContent = fmtWon(summary.total_market_value || sumBy(state.holdings, 'market_value'));
      document.getElementById('totalWeight').textContent = fmtPct(summary.total_weight || sumBy(state.holdings, 'weight'));
      document.getElementById('tableSub').textContent = `${currentDate()} · ${state.selectedEtf}`;
    }

    function renderRows() {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const rows = state.holdings
        .filter(row => !query || String(row.name || '').toLowerCase().includes(query) || String(row.ticker || '').toLowerCase().includes(query))
        .sort((a, b) => Number(b.weight || 0) - Number(a.weight || 0));

      document.getElementById('rows').innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.ticker || '')}</td>
          <td>${escapeHtml(row.name || '')}</td>
          <td>${fmtNum(row.quantity, 2)}</td>
          <td>${fmtNum(row.market_value)}</td>
          <td>${fmtPct(row.weight)}</td>
        </tr>
      `).join('') || '<tr><td colspan="5" class="empty">표시할 종목이 없습니다.</td></tr>';

      const topRows = rows.slice(0, 10);
      document.getElementById('rankList').innerHTML = topRows.map(row => `
        <div class="rank-item">
          <div class="rank-name">${escapeHtml(row.name || row.ticker || '')}</div>
          <div class="rank-value">${fmtPct(row.weight)}</div>
        </div>
      `).join('') || '<div class="empty">데이터가 없습니다.</div>';
    }

    function currentDate() {
      return document.getElementById('dateInput').value || document.getElementById('dateSelect').value;
    }

    function displayEtfName(code) {
      return state.products.get(code)?.name || prettyCode(code);
    }

    function prettyCode(code) {
      if (code === 'KODEX_200') return 'KODEX 200';
      if (code === 'TIME_KOSPI_ACTIVE') return 'TIME 코스피액티브';
      return String(code || '-').replaceAll('_', ' ');
    }

    function shortName(value) {
      const text = String(value || '-');
      return text.length > 26 ? `${text.slice(0, 25)}…` : text;
    }

    function sumBy(rows, key) {
      return rows.reduce((sum, row) => sum + Number(row[key] || 0), 0);
    }

    function fmtNum(value, digits = 0) {
      if (value === null || value === undefined || value === '') return '-';
      return Number(value || 0).toLocaleString('ko-KR', { maximumFractionDigits: digits });
    }

    function fmtPct(value) {
      if (value === null || value === undefined || value === '') return '-';
      return `${Number(value || 0).toFixed(2)}%`;
    }

    function fmtWon(value) {
      const number = Number(value || 0);
      const abs = Math.abs(number);
      if (abs >= 1000000000000) return `${(number / 1000000000000).toFixed(2)}조`;
      if (abs >= 100000000) return `${(number / 100000000).toFixed(1)}억`;
      return `${number.toLocaleString('ko-KR')}원`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      }[char]));
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    document.getElementById('refresh').addEventListener('click', loadEtfTabs);
    document.getElementById('dateSelect').addEventListener('change', event => {
      document.getElementById('dateInput').value = event.target.value;
      loadEtfTabs();
    });
    document.getElementById('dateInput').addEventListener('change', loadEtfTabs);
    document.getElementById('search').addEventListener('input', renderRows);

    init();
  </script>
</body>
</html>
