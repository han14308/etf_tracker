<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ETF Track</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #dde2e8;
      --text: #171a1f;
      --muted: #667085;
      --blue: #1f6feb;
      --green: #12805c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Noto Sans KR", sans-serif; color: var(--text); background: var(--bg); }
    header { padding: 22px 28px; background: var(--panel); border-bottom: 1px solid var(--line); }
    main { max-width: 1520px; margin: 0 auto; padding: 22px 28px 48px; }
    h1 { margin: 0 0 6px; font-size: 26px; }
    .muted { color: var(--muted); }
    .toolbar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 18px; }
    label { font-size: 13px; color: #344054; }
    input, select, button { height: 36px; border: 1px solid #cfd4dc; background: #fff; padding: 0 10px; font-size: 14px; }
    button { background: var(--blue); color: #fff; border-color: var(--blue); cursor: pointer; }
    .etf-picker { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; margin: 4px 0 16px; overflow: hidden; }
    .etf-picker-head { display: grid; grid-template-columns: 1fr 118px 148px 132px; gap: 8px; padding: 12px; border-bottom: 1px solid var(--line); }
    .etf-search { width: 100%; }
    .etf-count { min-width: 90px; text-align: right; padding: 8px 12px; font-size: 12px; color: var(--muted); border-bottom: 1px solid #edf0f2; }
    .etf-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); max-height: 260px; overflow: auto; }
    .etf-option { width: 100%; height: auto; min-height: 58px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; border: 0; border-bottom: 1px solid #edf0f2; border-right: 1px solid #edf0f2; background: #fff; color: var(--text); padding: 10px 12px; text-align: left; }
    .etf-option:hover { background: #f8fbff; }
    .etf-option.active { background: #eef6ff; box-shadow: inset 3px 0 0 var(--blue); }
    .etf-name { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .etf-meta { display: block; margin-top: 4px; color: var(--muted); font-size: 12px; }
    .etf-badge { justify-self: end; padding: 3px 7px; border-radius: 999px; background: #eef2f6; color: #344054; font-size: 12px; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 4px 0 20px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 15px; }
    .metric { margin-top: 8px; font-size: 24px; font-weight: 700; }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 16px; align-items: start; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .panel + .panel { margin-top: 16px; }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .panel-title { font-weight: 700; }
    .panel-tools { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .panel-tools input[type="checkbox"] { width: 16px; height: 16px; padding: 0; vertical-align: middle; }
    .search { width: 240px; }
    .table-wrap { overflow: auto; max-height: 360px; }
    table { width: 100%; min-width: 860px; border-collapse: collapse; }
    th, td { padding: 8px 12px; border-bottom: 1px solid #edf0f2; text-align: right; font-size: 13px; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f2f4f7; color: #344054; z-index: 1; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2) { text-align: left; }
    tbody tr { cursor: pointer; }
    tbody tr:hover { background: #f8fbff; }
    tbody tr.selected { background: #eef6ff; }
    .graph-grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 16px; margin-top: 16px; }
    .graph-grid .panel { display: flex; flex-direction: column; min-height: 430px; }
    .graph-grid .panel + .panel { margin-top: 0; }
    .chart { width: 100%; height: 340px; display: block; background: #fff; }
    .selected-list { max-height: 460px; overflow: auto; }
    .selected-item { display: grid; grid-template-columns: 24px 1fr auto; gap: 8px; align-items: center; padding: 10px 12px; border-bottom: 1px solid #edf0f2; }
    .selected-item input { width: 16px; height: 16px; }
    .selected-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .selected-meta { margin-top: 3px; font-size: 12px; color: var(--muted); }
    .remove { height: 28px; padding: 0 8px; background: #fff; color: #b42318; border-color: #f3b8b2; }
    .rank-list { padding: 8px 0; }
    .rank-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #edf0f2; cursor: pointer; }
    .rank-item:hover { background: #f8fbff; }
    .rank-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-value { font-weight: 700; color: var(--green); }
    .compare-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border-bottom: 1px solid #edf0f2; }
    .compare-stat { padding: 12px; border-right: 1px solid #edf0f2; }
    .compare-stat:last-child { border-right: 0; }
    .compare-label { color: var(--muted); font-size: 12px; }
    .compare-value { margin-top: 5px; font-size: 18px; font-weight: 700; }
    #comparePanel { flex: 1; overflow: hidden; }
    .compare-bars { padding: 10px 12px 14px; max-height: 260px; overflow: auto; }
    .compare-bar { display: grid; grid-template-columns: minmax(130px, 1fr) minmax(120px, 1.4fr) 72px; gap: 10px; align-items: center; padding: 8px 0; border-bottom: 1px solid #edf0f2; }
    .compare-bar:last-child { border-bottom: 0; }
    .compare-etf { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 700; }
    .compare-etf.current { color: var(--blue); }
    .compare-track { height: 10px; background: #eef2f6; border-radius: 999px; overflow: hidden; }
    .compare-fill { height: 100%; min-width: 2px; background: var(--blue); border-radius: 999px; }
    .compare-number { text-align: right; font-weight: 700; }
    .empty { padding: 28px; text-align: center; color: var(--muted); }
    @media (max-width: 1060px) {
      main, header { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr 1fr; }
      .layout { grid-template-columns: 1fr; }
      .graph-grid { grid-template-columns: 1fr; }
      .search { width: 100%; }
      .etf-picker { max-width: none; }
      .etf-picker-head { grid-template-columns: 1fr; }
      .compare-summary { grid-template-columns: 1fr 1fr; }
      .compare-bar { grid-template-columns: 1fr; }
      .compare-number { text-align: left; }
    }
  </style>
</head>
<body>
  <header>
    <h1>ETF Track</h1>
    <div class="muted">ETF별 구성종목과 종목별 추이</div>
  </header>

  <main>
    <div class="toolbar">
      <label>기준일 <input id="dateInput" type="date" list="dateOptions" /></label>
      <datalist id="dateOptions"></datalist>
      <label>빠른 선택 <select id="dateSelect"></select></label>
      <button id="refresh">조회</button>
      <span id="status" class="muted"></span>
    </div>

    <section id="tabs" class="etf-picker"></section>

    <div class="grid">
      <div class="card"><div class="muted">선택 ETF</div><div id="selectedName" class="metric">-</div></div>
      <div class="card"><div class="muted">종목수</div><div id="holdingCount" class="metric">-</div></div>
      <div class="card"><div class="muted">총 평가금액</div><div id="totalValue" class="metric">-</div></div>
      <div class="card"><div class="muted">총 비중</div><div id="totalWeight" class="metric">-</div></div>
    </div>

    <div class="layout">
      <div>
        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">구성종목</div>
              <div id="tableSub" class="muted"></div>
            </div>
            <input id="search" class="search" placeholder="종목명 또는 코드 검색" />
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>종목코드</th>
                  <th>종목명</th>
                  <th>수량</th>
                  <th>평가금액</th>
                  <th>종가</th>
                  <th>비중</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </section>

        <div class="graph-grid">
          <section class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">선택 종목 통합 그래프</div>
                <div class="muted">0, 빈값, 주말/휴장일은 그래프에서 제외됩니다.</div>
              </div>
              <div class="panel-tools">
                <label>기준
                  <select id="chartMetric">
                    <option value="weight">비중</option>
                    <option value="market_value">평가금액</option>
                    <option value="quantity">수량</option>
                    <option value="close_price">종가</option>
                  </select>
                </label>
                <label><input id="actualCloseToggle" type="checkbox" /> 실제 종가</label>
              </div>
            </div>
            <canvas id="chart" class="chart"></canvas>
          </section>

          <section class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">같은 섹터 ETF 보유 비교</div>
                <div id="compareSub" class="muted">구성종목을 클릭하면 같은 지역/섹터 ETF와 비교합니다.</div>
              </div>
              <div class="panel-tools">
                <label>기준
                  <select id="compareMetric">
                    <option value="weight">비중</option>
                    <option value="market_value">평가금액</option>
                    <option value="quantity">수량</option>
                    <option value="close_price">종가</option>
                  </select>
                </label>
              </div>
            </div>
            <div id="comparePanel"><div class="empty">비교할 종목을 선택하세요.</div></div>
          </section>
        </div>
      </div>

      <aside>
        <section class="panel">
          <div class="panel-head">
            <div class="panel-title">선택한 종목</div>
            <button id="clearSelected" class="remove">전체 삭제</button>
          </div>
          <div id="selectedList" class="selected-list"></div>
        </section>

        <section class="panel">
          <div class="panel-head"><div class="panel-title">상위 비중</div></div>
          <div id="rankList" class="rank-list"></div>
        </section>
      </aside>
    </div>
  </main>

  <script>
    const colors = ['#1f6feb', '#d76b00', '#12805c', '#7c3aed', '#c2410c', '#0369a1', '#be123c', '#4d7c0f'];
    const state = {
      dates: [],
      products: new Map(),
      summaries: [],
      selectedEtf: '',
      holdings: [],
      selected: new Map(),
      etfQuery: '',
      etfIssuer: 'ALL',
      etfRegion: 'ALL',
      etfTheme: 'ALL',
      etfOpen: false,
      compareSecurity: null,
      compareMetric: 'weight',
      holdingsByDate: new Map(),
      etfSearchComposing: false,
      holdingSearchComposing: false,
      showActualClose: false,
      marketDates: new Set(),
      marketDateRanges: new Set(),
    };

    async function init() {
      await Promise.all([loadDates(), loadProducts()]);
      await loadEtfTabs();
    }

    async function loadDates() {
      state.dates = await fetch('/api/dates').then(r => r.json());
      const dateSelect = document.getElementById('dateSelect');
      const dateInput = document.getElementById('dateInput');
      const options = document.getElementById('dateOptions');
      dateSelect.innerHTML = state.dates.map(d => `<option value="${d}">${d}</option>`).join('');
      options.innerHTML = state.dates.map(d => `<option value="${d}"></option>`).join('');
      if (state.dates.length) dateInput.value = state.dates[0];
    }

    async function loadProducts() {
      const products = await fetch('/api/products').then(r => r.json()).catch(() => []);
      state.products = new Map(products.map(product => [product.etf_code, product]));
    }

    async function loadEtfTabs() {
      const date = currentDate();
      if (!date) return;
      setStatus('ETF 목록 조회 중...');
      const summaries = await fetch(`/api/summary?start=${date}&end=${date}`).then(r => r.json());
      state.summaries = summaries;
      if (!state.selectedEtf || !summaries.some(row => row.etf_code === state.selectedEtf)) {
        state.selectedEtf = preferredEtf(summaries);
      }
      renderTabs();
      await loadHoldings();
    }

    function preferredEtf(summaries) {
      const codes = summaries.map(row => row.etf_code);
      return codes.find(code => code === 'KODEX_200') || codes.find(code => code.startsWith('TIME_')) || codes[0] || '';
    }

    function renderTabs() {
      renderEtfPicker();
      return;
      const tabs = document.getElementById('tabs');
      if (!state.summaries.length) {
        tabs.innerHTML = '<div class="empty">선택한 날짜에 저장된 ETF가 없습니다.</div>';
        return;
      }
      tabs.innerHTML = state.summaries.map(summary => {
        const name = state.products.get(summary.etf_code)?.name || prettyCode(summary.etf_code);
        const active = summary.etf_code === state.selectedEtf ? ' active' : '';
        return `
          <button class="tab${active}" data-etf="${summary.etf_code}">
            <span class="tab-name">${escapeHtml(shortName(name, 30))}</span>
            <span class="tab-meta">${escapeHtml(summary.etf_code)} · ${fmtNum(summary.holding_count)}개</span>
          </button>`;
      }).join('');
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', async () => {
          state.selectedEtf = tab.dataset.etf;
          renderTabs();
          await loadHoldings();
          await reloadSelectedHistories();
        });
      });
    }

    function renderEtfPicker() {
      const container = document.getElementById('tabs');
      if (!state.summaries.length) {
        container.innerHTML = '<div class="empty">선택한 날짜에 저장된 ETF가 없습니다.</div>';
        return;
      }
      const issuers = availableIssuers();
      const themes = availableThemes();
      const query = state.etfQuery.trim().toLowerCase();
      const visible = state.summaries.filter(summary => {
        const name = displayEtfName(summary.etf_code);
        const issuer = issuerFromSummary(summary);
        const category = classifyEtf(summary);
        const haystack = `${name} ${summary.etf_code} ${issuer} ${category.region} ${category.sectors.join(' ')}`.toLowerCase();
        return (
          (state.etfIssuer === 'ALL' || issuer === state.etfIssuer) &&
          (state.etfRegion === 'ALL' || category.region === state.etfRegion) &&
          (state.etfTheme === 'ALL' || category.sectors.includes(state.etfTheme)) &&
          (!query || haystack.includes(query))
        );
      });

      container.innerHTML = `
        <div class="etf-picker-head">
          <input id="etfSearch" class="etf-search" placeholder="ETF명, 코드, 운용사 검색" value="${escapeHtml(state.etfQuery)}" />
          <select id="regionFilter">
            <option value="ALL">전체 지역</option>
            ${['국내', '해외', '혼합'].map(region => `<option value="${region}" ${region === state.etfRegion ? 'selected' : ''}>${region}</option>`).join('')}
          </select>
          <select id="themeFilter">
            <option value="ALL">전체 섹터</option>
            ${themes.map(theme => `<option value="${escapeHtml(theme)}" ${theme === state.etfTheme ? 'selected' : ''}>${escapeHtml(theme)}</option>`).join('')}
          </select>
          <select id="issuerFilter">
            <option value="ALL">전체 운용사</option>
            ${issuers.map(issuer => `<option value="${escapeHtml(issuer)}" ${issuer === state.etfIssuer ? 'selected' : ''}>${escapeHtml(issuer)}</option>`).join('')}
          </select>
        </div>
        <div class="etf-count">${fmtNum(visible.length)} / ${fmtNum(state.summaries.length)}개</div>
        <div class="etf-list">
          ${visible.map(summary => {
        const name = displayEtfName(summary.etf_code);
        const active = summary.etf_code === state.selectedEtf ? ' active' : '';
        const category = classifyEtf(summary);
        return `
          <button class="etf-option${active}" data-etf="${escapeHtml(summary.etf_code)}">
            <span>
              <span class="etf-name">${escapeHtml(shortName(name, 34))}</span>
              <span class="etf-meta">${escapeHtml(summary.etf_code)} · ${escapeHtml(category.region)} · ${escapeHtml(category.sectors.join('/'))} · ${escapeHtml(issuerFromSummary(summary))}</span>
            </span>
            <span class="etf-badge">${fmtNum(summary.holding_count)}개</span>
          </button>`;
      }).join('') || '<div class="empty">검색 결과가 없습니다.</div>'}
        </div>`;

      const search = document.getElementById('etfSearch');
      if (search) {
        search.addEventListener('input', event => {
          if (state.etfSearchComposing || event.isComposing) return;
          state.etfQuery = event.target.value;
          renderEtfPicker();
          document.getElementById('etfSearch')?.focus();
        });
        search.addEventListener('compositionstart', () => {
          state.etfSearchComposing = true;
        });
        search.addEventListener('compositionend', event => {
          state.etfSearchComposing = false;
          state.etfQuery = event.target.value;
          renderEtfPicker();
          document.getElementById('etfSearch')?.focus();
        });
        search.focus();
        search.setSelectionRange(search.value.length, search.value.length);
      }
      document.getElementById('issuerFilter')?.addEventListener('change', event => {
        state.etfIssuer = event.target.value;
        renderEtfPicker();
      });
      document.getElementById('regionFilter')?.addEventListener('change', event => {
        state.etfRegion = event.target.value;
        if (!availableThemes().includes(state.etfTheme)) state.etfTheme = 'ALL';
        renderEtfPicker();
      });
      document.getElementById('themeFilter')?.addEventListener('change', event => {
        state.etfTheme = event.target.value;
        renderEtfPicker();
      });
      document.querySelectorAll('.etf-option').forEach(option => {
        option.addEventListener('click', async () => {
          state.selectedEtf = option.dataset.etf;
          renderEtfPicker();
          await loadHoldings();
          await reloadSelectedHistories();
        });
      });
    }

    function availableIssuers() {
      return [...new Set(state.summaries.map(issuerFromSummary).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function availableThemes() {
      return [...new Set(
        state.summaries
          .filter(summary => state.etfRegion === 'ALL' || classifyEtf(summary).region === state.etfRegion)
          .flatMap(summary => classifyEtf(summary).sectors)
          .filter(Boolean)
      )].sort((a, b) => themeOrder(a) - themeOrder(b) || a.localeCompare(b));
    }

    function classifyEtf(summary) {
      const name = displayEtfName(summary.etf_code);
      const sectors = classifySectors(name);
      return {
        region: classifyRegion(name),
        sectors,
        theme: sectors.join('/'),
      };
    }

    function classifyRegion(name) {
      const text = String(name || '');
      if (includesAny(text, ['TDF', '채권혼합', '커버드콜채권혼합'])) return '혼합';
      if (includesAny(text, ['미국', '글로벌', '차이나', '아시아', 'iShares'])) return '해외';
      return '국내';
    }

    function classifySectors(name) {
      const text = String(name || '');
      const sectors = [];
      if (includesAny(text, ['AI', '인공지능', '에이아이'])) sectors.push('AI');
      if (includesAny(text, ['반도체', '세미컨덕터', 'SEMICONDUCTOR', '칩', 'CHIP', '메모리', 'HBM', 'SOX', '필라델피아', '엔비디아', 'NVIDIA', 'TSMC'])) sectors.push('반도체');
      if (includesAny(text, ['테크', 'TECH', '기술', '나스닥', 'NASDAQ', '혁신기술', '금융테크', '핀테크', '소프트웨어', '인터넷', '플랫폼'])) sectors.push('테크');
      if (includesAny(text, ['배당', '고배당', '월배당', '리츠'])) sectors.push('배당');
      if (includesAny(text, ['밸류업', '가치주', '저평가', '주주환원'])) sectors.push('밸류업');
      if (includesAny(text, ['채권', '국고채', '금융채', '회사채', '종합채권', '하이일드', '투자등급', '달러채권', '인플레이션국채'])) sectors.push('채권');
      if (includesAny(text, ['금리', '단기', '머니마켓', 'CD', 'KOFR', 'SOFR', '파킹', '초단기'])) sectors.push('금리');
      return sectors.length ? [...new Set(sectors)] : ['기타'];
    }

    function includesAny(text, keywords) {
      const upper = String(text || '').toUpperCase();
      return keywords.some(keyword => upper.includes(String(keyword).toUpperCase()));
    }

    function themeOrder(theme) {
      const index = ['AI', '반도체', '테크', '배당', '밸류업', '채권', '금리', '기타'].indexOf(theme);
      return index === -1 ? 999 : index;
    }

    function issuerFromSummary(summary) {
      return state.products.get(summary.etf_code)?.issuer || issuerFromCode(summary.etf_code);
    }

    function issuerFromCode(code) {
      const text = String(code || '');
      if (text.startsWith('KRX_')) return state.products.get(text)?.issuer || 'KRX';
      return text.split('_', 1)[0] || 'ETF';
    }

    async function loadHoldings() {
      const date = currentDate();
      if (!date || !state.selectedEtf) return;
      setStatus(`${displayEtfName(state.selectedEtf)} 조회 중...`);
      state.holdings = await fetch(`/api/holdings?trade_date=${date}&etf_code=${encodeURIComponent(state.selectedEtf)}`).then(r => r.json());
      renderSummary();
      renderRows();
      if (state.compareSecurity) await loadPeerComparison(state.compareSecurity);
      setStatus(`${displayEtfName(state.selectedEtf)} ${fmtNum(state.holdings.length)}개 종목`);
    }

    function renderSummary() {
      const summary = state.summaries.find(row => row.etf_code === state.selectedEtf) || {};
      document.getElementById('selectedName').textContent = shortName(displayEtfName(state.selectedEtf), 18);
      document.getElementById('holdingCount').textContent = fmtNum(summary.holding_count || state.holdings.length);
      document.getElementById('totalValue').textContent = fmtWon(summary.total_market_value || sumBy(state.holdings, 'market_value'));
      document.getElementById('totalWeight').textContent = fmtPct(summary.total_weight || sumBy(state.holdings, 'weight'));
      document.getElementById('tableSub').textContent = `${currentDate()} · ${state.selectedEtf}`;
    }

    function renderRows() {
      const query = document.getElementById('search').value.trim().toLowerCase();
      const rows = state.holdings
        .filter(row => !query || String(row.name || '').toLowerCase().includes(query) || String(row.ticker || '').toLowerCase().includes(query))
        .sort((a, b) => Number(b.weight || 0) - Number(a.weight || 0));

      document.getElementById('rows').innerHTML = rows.map(row => {
        const key = securityKey(row);
        const selected = state.selected.has(key) ? ' selected' : '';
        return `
          <tr class="${selected}" data-key="${escapeHtml(key)}">
            <td>${escapeHtml(row.ticker || '')}</td>
            <td>${escapeHtml(row.name || '')}</td>
            <td>${fmtNum(row.quantity, 2)}</td>
            <td>${fmtNum(row.market_value)}</td>
            <td>${formatMetricValue(metricValue(row, 'close_price'), 'close_price')}</td>
            <td>${fmtPct(row.weight)}</td>
          </tr>`;
      }).join('') || '<tr><td colspan="6" class="empty">표시할 종목이 없습니다.</td></tr>';

      document.querySelectorAll('#rows tr[data-key]').forEach(tr => {
        tr.addEventListener('click', async () => {
          const row = rows.find(item => securityKey(item) === tr.dataset.key);
          if (row) {
            await addSecurity(row);
            await loadPeerComparison(row);
          }
        });
      });

      const topRows = rows.slice(0, 10);
      document.getElementById('rankList').innerHTML = topRows.map(row => `
        <div class="rank-item" data-key="${escapeHtml(securityKey(row))}">
          <div class="rank-name">${escapeHtml(row.name || row.ticker || '')}</div>
          <div class="rank-value">${fmtPct(row.weight)}</div>
        </div>
      `).join('') || '<div class="empty">데이터가 없습니다.</div>';
      document.querySelectorAll('.rank-item[data-key]').forEach(item => {
        item.addEventListener('click', async () => {
          const row = rows.find(x => securityKey(x) === item.dataset.key);
          if (row) {
            await addSecurity(row);
            await loadPeerComparison(row);
          }
        });
      });
    }

    async function addSecurity(row) {
      const key = securityKey(row);
      if (!state.selected.has(key)) {
        const item = {
          key,
          ticker: row.ticker,
          isin: row.isin,
          name: row.name,
          checked: true,
          color: colors[state.selected.size % colors.length],
          histories: {},
          closeHistory: [],
          closeError: '',
        };
        state.selected.set(key, item);
        renderSelected();
        await loadHistory(item);
      } else {
        const item = state.selected.get(key);
        item.checked = true;
        renderSelected();
      }
      renderRows();
      drawChart();
    }

    async function loadHistory(item) {
      const params = new URLSearchParams({ etf_code: state.selectedEtf });
      if (item.isin) params.set('isin', item.isin);
      if (item.ticker) params.set('ticker', item.ticker);
      const history = await fetch(`/api/holding-history?${params.toString()}`).then(r => r.json()).catch(() => []);
      item.histories[state.selectedEtf] = history.filter(row => matchesSecurity(item, row));
      await loadMarketDatesForHistory(currentHistory(item));
      await loadCloseHistory(item);
      renderSelected();
      drawChart();
    }

    async function loadMarketDatesForHistory(history) {
      const dates = (history || []).map(point => normalizeTradeDate(point.trade_date)).filter(Boolean).sort();
      if (!dates.length) return;
      const start = dates[0];
      const end = dates[dates.length - 1];
      const rangeKey = `${start}:${end}`;
      if (state.marketDateRanges.has(rangeKey)) return;
      state.marketDateRanges.add(rangeKey);
      const params = new URLSearchParams({ start, end });
      const marketDates = await fetch(`/api/market-dates?${params.toString()}`).then(r => r.json()).catch(() => []);
      marketDates.forEach(date => state.marketDates.add(normalizeTradeDate(date)));
    }

    async function loadCloseHistory(item) {
      item.closeHistory = [];
      item.closeError = '';
      if (!isKrxTicker(item.ticker)) {
        item.closeError = '국내 6자리 코드 아님';
        return;
      }
      const history = currentHistory(item);
      if (!history.length) {
        item.closeError = '보유 이력 없음';
        return;
      }
      const dates = history.map(point => point.trade_date).filter(Boolean).sort();
      const params = new URLSearchParams({
        ticker: item.ticker,
        start: dates[0],
        end: dates[dates.length - 1],
      });
      try {
        const response = await fetch(`/api/close-history?${params.toString()}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        item.closeHistory = await response.json();
        if (!item.closeHistory.length) item.closeError = '종가 없음';
      } catch (error) {
        item.closeHistory = [];
        item.closeError = '종가 API 실패';
      }
      item.closeHistory.forEach(point => state.marketDates.add(normalizeTradeDate(point.trade_date)));
    }

    async function reloadSelectedHistories() {
      const items = [...state.selected.values()];
      for (const item of items) {
        await loadHistory(item);
      }
      renderSelected();
      renderRows();
      drawChart();
    }

    async function loadPeerComparison(row) {
      state.compareSecurity = row;
      renderPeerComparison(null, true);
      const date = currentDate();
      if (!date) return;
      if (!state.holdingsByDate.has(date)) {
        const records = await fetch(`/api/holdings?trade_date=${date}`).then(r => r.json()).catch(() => []);
        state.holdingsByDate.set(date, records);
      }
      renderPeerComparison(state.holdingsByDate.get(date) || [], false);
    }

    function renderPeerComparison(allHoldings, loading = false) {
      const panel = document.getElementById('comparePanel');
      const sub = document.getElementById('compareSub');
      const security = state.compareSecurity;
      if (!security) {
        sub.textContent = '구성종목을 클릭하면 같은 지역/섹터 ETF와 비교합니다.';
        panel.innerHTML = '<div class="empty">비교할 종목을 선택하세요.</div>';
        return;
      }
      const selectedSummary = state.summaries.find(summary => summary.etf_code === state.selectedEtf);
      const selectedCategory = selectedSummary ? classifyEtf(selectedSummary) : { region: '전체', sectors: ['전체'], theme: '전체' };
      sub.textContent = `${security.name || security.ticker || ''} · ${selectedCategory.region}/${selectedCategory.theme}`;
      if (loading || !allHoldings) {
        panel.innerHTML = '<div class="empty">같은 섹터 ETF 비교 계산 중...</div>';
        return;
      }

      const peers = state.summaries.filter(summary => {
        const category = classifyEtf(summary);
        return category.region === selectedCategory.region && category.sectors.some(sector => selectedCategory.sectors.includes(sector));
      });
      const key = securityKey(security);
      const byEtf = new Map();
      allHoldings.forEach(row => {
        if (securityKey(row) === key) byEtf.set(row.etf_code, row);
      });
      const metric = state.compareMetric;
      const rows = peers.map(summary => {
        const holding = byEtf.get(summary.etf_code) || {};
        return {
          etf_code: summary.etf_code,
          name: displayEtfName(summary.etf_code),
          value: metricValue(holding, metric),
          holding,
        };
      }).sort((a, b) => Number(b.value || 0) - Number(a.value || 0));

      const holders = rows.filter(row => row.value > 0);
      const current = rows.find(row => row.etf_code === state.selectedEtf);
      const average = holders.length ? sumBy(holders, 'value') / holders.length : 0;
      const max = Math.max(1, ...rows.map(row => row.value));
      panel.innerHTML = `
        <div class="compare-summary">
          <div class="compare-stat"><div class="compare-label">현재 ETF</div><div class="compare-value">${formatMetricValue(current?.value || 0, metric)}</div></div>
          <div class="compare-stat"><div class="compare-label">보유 ETF</div><div class="compare-value">${fmtNum(holders.length)} / ${fmtNum(peers.length)}</div></div>
          <div class="compare-stat"><div class="compare-label">보유 ETF 평균</div><div class="compare-value">${formatMetricValue(average, metric)}</div></div>
          <div class="compare-stat"><div class="compare-label">최대</div><div class="compare-value">${formatMetricValue(max === 1 && !holders.length ? 0 : max, metric)}</div></div>
        </div>
        <div class="compare-bars">
          ${rows.map(row => {
        const width = max ? Math.max(0, Number(row.value || 0) / max * 100) : 0;
        const currentClass = row.etf_code === state.selectedEtf ? ' current' : '';
        return `
            <div class="compare-bar">
              <div class="compare-etf${currentClass}" title="${escapeHtml(row.name)}">${escapeHtml(shortName(row.name, 30))}</div>
              <div class="compare-track"><div class="compare-fill" style="width:${width.toFixed(2)}%"></div></div>
              <div class="compare-number">${formatMetricValue(row.value, metric)}</div>
            </div>`;
      }).join('') || '<div class="empty">같은 섹터 ETF가 없습니다.</div>'}
        </div>`;
    }

    function currentHistory(item) {
      return (item.histories?.[state.selectedEtf] || []).filter(row => matchesSecurity(item, row));
    }

    function renderSelected() {
      const items = [...state.selected.values()];
      const list = document.getElementById('selectedList');
      if (!items.length) {
        list.innerHTML = '<div class="empty">종목을 클릭하면 여기에 추가됩니다.</div>';
        return;
      }
      list.innerHTML = items.map(item => `
        <div class="selected-item">
          <input type="checkbox" data-action="toggle" data-key="${escapeHtml(item.key)}" ${item.checked ? 'checked' : ''} />
            <div>
              <div class="selected-name" style="color:${item.color}">${escapeHtml(item.name || item.ticker || '')}</div>
            <div class="selected-meta">${escapeHtml(item.ticker || '')} · 보유 ${fmtNum(currentHistory(item).length)}일 · ${closeHistoryLabel(item)}</div>
          </div>
          <button class="remove" data-action="remove" data-key="${escapeHtml(item.key)}">삭제</button>
        </div>
      `).join('');
      list.querySelectorAll('[data-action="toggle"]').forEach(input => {
        input.addEventListener('change', () => {
          const item = state.selected.get(input.dataset.key);
          if (item) item.checked = input.checked;
          drawChart();
        });
      });
      list.querySelectorAll('[data-action="remove"]').forEach(button => {
        button.addEventListener('click', () => {
          state.selected.delete(button.dataset.key);
          renderSelected();
          renderRows();
          drawChart();
        });
      });
    }

    function closeHistoryLabel(item) {
      if (item.closeHistory?.length) return `종가 ${fmtNum(item.closeHistory.length)}일`;
      return item.closeError || '종가 대기';
    }

    function drawChart() {
      const canvas = document.getElementById('chart');
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, rect.width * dpr);
      canvas.height = Math.max(1, rect.height * dpr);
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const metric = document.getElementById('chartMetric').value;
      const series = [...state.selected.values()]
        .map(item => ({ ...item, history: currentHistory(item) }))
        .filter(item => item.checked && item.history.length);
      if (!series.length) {
        ctx.fillStyle = '#667085';
        ctx.fillText('체크된 종목의 히스토리가 없습니다.', 24, 34);
        return;
      }

      const weekdaySeries = series.map(item => ({
        ...item,
        history: validMetricHistory(item.history, metric),
      })).filter(item => item.history.length);
      if (!weekdaySeries.length) {
        ctx.fillStyle = '#667085';
        ctx.fillText('평일 거래 데이터가 없습니다.', 24, 34);
        return;
      }

      const realCloseSeries = metric === 'close_price' && state.showActualClose
        ? series.map(item => ({
          ...item,
          history: validMetricHistory(item.closeHistory || [], 'close_price'),
        })).filter(item => item.history.length)
        : [];
      const dates = [...new Set([
        ...weekdaySeries.flatMap(item => item.history.map(point => point.trade_date)),
        ...realCloseSeries.flatMap(item => item.history.map(point => point.trade_date)),
      ])].sort();
      const max = Math.max(
        1,
        ...weekdaySeries.flatMap(item => item.history.map(point => metricValue(point, metric))),
        ...realCloseSeries.flatMap(item => item.history.map(point => metricValue(point, 'close_price'))),
      ) * 1.15;
      const pad = { left: 58, right: 22, top: 22, bottom: 44 };
      const x = index => pad.left + (dates.length === 1 ? 0 : index * (width - pad.left - pad.right) / (dates.length - 1));
      const y = value => height - pad.bottom - (Number(value || 0) / max) * (height - pad.top - pad.bottom);

      ctx.strokeStyle = '#d0d5dd';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top);
      ctx.lineTo(pad.left, height - pad.bottom);
      ctx.lineTo(width - pad.right, height - pad.bottom);
      ctx.stroke();

      [0, max / 2, max].forEach(value => {
        ctx.fillStyle = '#667085';
        ctx.fillText(chartAxisLabel(value, metric), 8, y(value) + 4);
        ctx.strokeStyle = '#eef2f6';
        ctx.beginPath();
        ctx.moveTo(pad.left, y(value));
        ctx.lineTo(width - pad.right, y(value));
        ctx.stroke();
      });

      weekdaySeries.forEach(item => {
        const byDate = new Map(item.history.map(point => [point.trade_date, point]));
        const coords = dates.map((date, index) => {
          const point = byDate.get(date);
          return point && hasMetricValue(point, metric) ? [x(index), y(metricValue(point, metric))] : null;
        });
        drawLine(ctx, coords, item.color);
      });

      realCloseSeries.forEach(item => {
        const byDate = new Map(item.history.map(point => [point.trade_date, point]));
        const coords = dates.map((date, index) => {
          const point = byDate.get(date);
          return point && hasMetricValue(point, 'close_price') ? [x(index), y(metricValue(point, 'close_price'))] : null;
        });
        drawLine(ctx, coords, item.color, { dash: [5, 4], radius: 1.8 });
      });

      ctx.fillStyle = '#667085';
      dates.forEach((date, index) => {
        if (index === 0 || index === dates.length - 1 || index % 5 === 0) {
          ctx.save();
          ctx.translate(x(index), height - 14);
          ctx.rotate(-0.45);
          ctx.fillText(date.slice(5), 0, 0);
          ctx.restore();
        }
      });
    }

    function drawLine(ctx, coords, color, options = {}) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.setLineDash(options.dash || []);
      ctx.beginPath();
      let drawing = false;
      coords.forEach(point => {
        if (!point) {
          drawing = false;
          return;
        }
        const [px, py] = point;
        if (drawing) {
          ctx.lineTo(px, py);
        } else {
          ctx.moveTo(px, py);
          drawing = true;
        }
      });
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = color;
      coords.filter(Boolean).forEach(([px, py]) => {
        ctx.beginPath();
        ctx.arc(px, py, options.radius || 2.5, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function securityKey(row) {
      return row.ticker || row.isin || row.name;
    }

    function matchesSecurity(item, row) {
      const itemTicker = String(item?.ticker || '').trim();
      const rowTicker = String(row?.ticker || '').trim();
      if (itemTicker && rowTicker) return itemTicker === rowTicker;
      const itemIsin = String(item?.isin || '').trim();
      const rowIsin = String(row?.isin || '').trim();
      if (itemIsin && rowIsin) return itemIsin === rowIsin;
      if (!rowTicker && !rowIsin) return true;
      return securityKey(item) === securityKey(row);
    }

    function isTradingWeekday(value) {
      const normalized = normalizeTradeDate(value);
      if (!normalized) return false;
      const [year, month, dayOfMonth] = normalized.split('-').map(Number);
      const date = new Date(year, month - 1, dayOfMonth);
      const day = date.getDay();
      return day !== 0 && day !== 6;
    }

    function isOpenMarketDate(value) {
      const normalized = normalizeTradeDate(value);
      if (!normalized || !isTradingWeekday(normalized)) return false;
      return state.marketDates.size ? state.marketDates.has(normalized) : true;
    }

    function hasMetricValue(point, metric) {
      const value = metricValue(point, metric);
      return Number.isFinite(value) && value > 0;
    }

    function validMetricHistory(history, metric) {
      const seen = new Set();
      return (history || [])
        .map(point => ({ ...point, trade_date: normalizeTradeDate(point?.trade_date) }))
        .filter(point => point.trade_date && isOpenMarketDate(point.trade_date) && hasMetricValue(point, metric))
        .sort((a, b) => String(a.trade_date).localeCompare(String(b.trade_date)))
        .filter(point => {
          if (seen.has(point.trade_date)) return false;
          seen.add(point.trade_date);
          return true;
        });
    }

    function normalizeTradeDate(value) {
      const match = String(value || '').match(/^(\d{4})-?(\d{2})-?(\d{2})/);
      return match ? `${match[1]}-${match[2]}-${match[3]}` : '';
    }

    function currentDate() {
      return document.getElementById('dateInput').value || document.getElementById('dateSelect').value;
    }

    function displayEtfName(code) {
      return state.products.get(code)?.name || prettyCode(code);
    }

    function prettyCode(code) {
      if (code === 'KODEX_200') return 'KODEX 200';
      if (code === 'TIME_KOSPI_ACTIVE') return 'TIME 코스피액티브';
      return String(code || '-').replaceAll('_', ' ');
    }

    function shortName(value, max = 26) {
      const text = String(value || '-');
      return text.length > max ? `${text.slice(0, max - 1)}…` : text;
    }

    function sumBy(rows, key) {
      return rows.reduce((sum, row) => sum + Number(row[key] || 0), 0);
    }

    function fmtNum(value, digits = 0) {
      if (value === null || value === undefined || value === '') return '-';
      return Number(value || 0).toLocaleString('ko-KR', { maximumFractionDigits: digits });
    }

    function fmtPct(value) {
      if (value === null || value === undefined || value === '') return '-';
      return `${Number(value || 0).toFixed(2)}%`;
    }

    function fmtWon(value) {
      const number = Number(value || 0);
      const abs = Math.abs(number);
      if (abs >= 1000000000000) return `${(number / 1000000000000).toFixed(2)}조`;
      if (abs >= 100000000) return `${(number / 100000000).toFixed(1)}억`;
      return `${number.toLocaleString('ko-KR')}원`;
    }

    function formatMetricValue(value, metric) {
      if (metric === 'weight') return fmtPct(value);
      if (metric === 'market_value') return fmtWon(value);
      if (metric === 'close_price') return value ? `${fmtNum(value, 2)}원` : '-';
      return fmtNum(value, 2);
    }

    function chartAxisLabel(value, metric) {
      if (metric === 'weight') return `${value.toFixed(1)}%`;
      if (metric === 'market_value') return shortNumber(value);
      if (metric === 'close_price') return shortNumber(value);
      return shortNumber(value);
    }

    function metricValue(row, metric) {
      if (metric === 'close_price') {
        const close = Number(row?.close_price);
        return Number.isFinite(close) && close > 0 ? close : estimatedClosePrice(row);
      }
      const value = Number(row?.[metric]);
      return Number.isFinite(value) ? value : 0;
    }

    function estimatedClosePrice(row) {
      const marketValue = Number(row?.market_value);
      const quantity = Number(row?.quantity);
      if (!Number.isFinite(marketValue) || !Number.isFinite(quantity) || quantity <= 0) return 0;
      return marketValue / quantity;
    }

    function isKrxTicker(value) {
      return /^\d{6}$/.test(String(value || ''));
    }

    function shortNumber(value) {
      const number = Number(value || 0);
      const abs = Math.abs(number);
      if (abs >= 100000000) return `${(number / 100000000).toFixed(1)}억`;
      if (abs >= 10000) return `${(number / 10000).toFixed(1)}만`;
      return number.toFixed(0);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      }[char]));
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    document.getElementById('refresh').addEventListener('click', loadEtfTabs);
    document.getElementById('dateSelect').addEventListener('change', event => {
      document.getElementById('dateInput').value = event.target.value;
      loadEtfTabs();
    });
    document.getElementById('dateInput').addEventListener('change', loadEtfTabs);
    const holdingSearch = document.getElementById('search');
    holdingSearch.addEventListener('input', event => {
      if (state.holdingSearchComposing || event.isComposing) return;
      renderRows();
    });
    holdingSearch.addEventListener('compositionstart', () => {
      state.holdingSearchComposing = true;
    });
    holdingSearch.addEventListener('compositionend', () => {
      state.holdingSearchComposing = false;
      renderRows();
    });
    document.getElementById('chartMetric').addEventListener('change', drawChart);
    document.getElementById('actualCloseToggle').addEventListener('change', event => {
      state.showActualClose = event.target.checked;
      drawChart();
    });
    document.getElementById('compareMetric').addEventListener('change', event => {
      state.compareMetric = event.target.value;
      const rows = state.holdingsByDate.get(currentDate());
      if (rows) renderPeerComparison(rows, false);
    });
    document.getElementById('clearSelected').addEventListener('click', () => {
      state.selected.clear();
      renderSelected();
      renderRows();
      drawChart();
    });
    init();
  </script>
</body>
</html>
